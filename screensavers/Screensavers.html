<script type="text/babel">
/* global React, ReactDOM */

const { useState, useEffect, useRef, useCallback } = React;

const MODULE_ORDER = ["warp","aquarium","planes","lava","toast","clock","pipes","screams"];

function pad(n){ return n < 10 ? "0"+n : ""+n; }
function nowStr(){
  const d = new Date();
  const h = d.getHours(), h12 = h % 12 || 12;
  return `${pad(h12)}:${pad(d.getMinutes())}:${pad(d.getSeconds())} ${h < 12 ? 'AM' : 'PM'}`;
}

const EGG_MESSAGES = [
  "you have 1 new memo",
  "hello from 1994",
  "is this thing on?",
  "→ press any key ←",
  "the pipes are listening",
  "keep staring. we dare you.",
  "do clocks dream?",
  "warp factor 9, Mr. Sulu",
];

function App(){
  const [selected, setSelected] = useState(() => localStorage.getItem("ss.selected") || "warp");
  const [density, setDensity] = useState(() => +(localStorage.getItem("ss.density") || 0.5));
  const [showClock, setShowClock] = useState(() => localStorage.getItem("ss.clock") === "1");
  const [sound, setSound] = useState(() => localStorage.getItem("ss.sound") === "1");
  const [eggs, setEggs] = useState(() => (localStorage.getItem("ss.eggs") ?? "1") === "1");
  const [cycle, setCycle] = useState(() => localStorage.getItem("ss.cycle") === "1");
  const [cycleMin, setCycleMin] = useState(() => +(localStorage.getItem("ss.cycleMin") || 30));
  const [picFolder, setPicFolder] = useState(() => localStorage.getItem("ss.picFolder") || "");
  const [idleSec, setIdleSec] = useState(8);
  const [countdown, setCountdown] = useState(null);
  const [time, setTime] = useState(nowStr());
  const previewRef = useRef(null);
  const previewInstance = useRef(null);
  const fsRef = useRef(null);
  const fsInstance = useRef(null);
  const [fullscreen, setFullscreen] = useState(false);
  const audioRef = useRef(null);

  // persist
  useEffect(() => { localStorage.setItem("ss.selected", selected); }, [selected]);
  useEffect(() => { localStorage.setItem("ss.density", String(density)); }, [density]);
  useEffect(() => { localStorage.setItem("ss.clock", showClock ? "1":"0"); }, [showClock]);
  useEffect(() => { localStorage.setItem("ss.sound", sound ? "1":"0"); }, [sound]);
  useEffect(() => { localStorage.setItem("ss.eggs", eggs ? "1":"0"); }, [eggs]);
  useEffect(() => { localStorage.setItem("ss.cycle", cycle ? "1":"0"); }, [cycle]);
  useEffect(() => { localStorage.setItem("ss.cycleMin", String(cycleMin)); }, [cycleMin]);
  useEffect(() => { localStorage.setItem("ss.picFolder", picFolder); }, [picFolder]);

  // clock tick
  useEffect(() => {
    const id = setInterval(() => setTime(nowStr()), 1000);
    return () => clearInterval(id);
  }, []);

  // mount preview
  useEffect(() => {
    if (previewInstance.current){ previewInstance.current.stop(); previewInstance.current = null; }
    const mod = window.Screensavers.modules[selected];
    if (mod && previewRef.current){
      previewInstance.current = mod.start(previewRef.current, { density });
    }
    return () => {
      if (previewInstance.current){ previewInstance.current.stop(); previewInstance.current = null; }
    };
  }, [selected, density]);

  // fullscreen mount
  useEffect(() => {
    const fsScene = document.getElementById("fs-scene");
    const fsEl = document.getElementById("fs");
    if (fullscreen){
      fsEl.classList.add("on");
      const mod = window.Screensavers.modules[selected];
      fsInstance.current = mod.start(fsScene, { density });
      if (sound && audioRef.current){ try { audioRef.current.currentTime = 0; audioRef.current.play().catch(()=>{}); } catch(e){} }
    } else {
      fsEl.classList.remove("on");
      if (fsInstance.current){ fsInstance.current.stop(); fsInstance.current = null; }
      // clear eggs
      document.querySelectorAll(".egg").forEach(e => e.remove());
      if (audioRef.current){ try { audioRef.current.pause(); } catch(e){} }
    }
  }, [fullscreen, selected, density, sound]);

  // fs clock
  useEffect(() => {
    const el = document.getElementById("fs-clock");
    if (!el) return;
    el.textContent = showClock && fullscreen ? time : "";
  }, [time, showClock, fullscreen]);

  // easter eggs
  useEffect(() => {
    if (!fullscreen || !eggs) return;
    const id = setInterval(() => {
      if (Math.random() < 0.5) return;
      const el = document.createElement("div");
      el.className = "egg";
      el.textContent = EGG_MESSAGES[Math.floor(Math.random()*EGG_MESSAGES.length)];
      el.style.left = (10 + Math.random()*70) + "vw";
      el.style.top = (15 + Math.random()*60) + "vh";
      document.getElementById("fs").appendChild(el);
      setTimeout(() => el.remove(), 4200);
    }, 6000);
    return () => clearInterval(id);
  }, [fullscreen, eggs]);

  // idle auto-start & exit-on-move
  useEffect(() => {
    let last = Date.now();
    let timer = null;
    const tick = () => {
      if (fullscreen) { setCountdown(null); return; }
      const left = Math.max(0, Math.ceil((idleSec*1000 - (Date.now()-last))/1000));
      setCountdown(left);
      if (left === 0){ setFullscreen(true); }
    };
    const onActivity = () => {
      last = Date.now();
      if (fullscreen){
        // small delay so we don't exit on the activating click
        setFullscreen(false);
      }
    };
    timer = setInterval(tick, 250);
    window.addEventListener("mousemove", onActivity);
    window.addEventListener("keydown", onActivity);
    window.addEventListener("mousedown", onActivity);
    window.addEventListener("touchstart", onActivity);
    return () => {
      clearInterval(timer);
      window.removeEventListener("mousemove", onActivity);
      window.removeEventListener("keydown", onActivity);
      window.removeEventListener("mousedown", onActivity);
      window.removeEventListener("touchstart", onActivity);
    };
  }, [fullscreen, idleSec]);

  const test = () => { setFullscreen(true); };

  return (
    <div className="cp-wrap">
      <div className="cp">
        <div className="cp-title">
          <span className="dot" />
          <span className="t">Screensavers — Control Panel</span>
          <span className="sp" />
          <span className="meta">v1.0 · {time}</span>
        </div>
        <div className="cp-body">
          {/* left: module list */}
          <div className="cp-col">
            <div className="cp-label">Modules <span className="hint">({MODULE_ORDER.length} installed)</span></div>
            <ul className="mod-list">
              {MODULE_ORDER.map(key => {
                const m = window.Screensavers.modules[key];
                return (
                  <li key={key} className={selected===key?"active":""} onClick={() => setSelected(key)}>
                    <span className="swatch" style={{ background: m.swatch }} />
                    <span>{m.title}</span>
                  </li>
                );
              })}
            </ul>
          </div>
          {/* middle: preview */}
          <div className="cp-col">
            <div className="cp-label">Preview <span className="hint">click Test for full screen</span></div>
            <div className="preview-wrap">
              <div className="preview" ref={previewRef}>
                <div className="scanlines" />
                <div className="vignette" />
              </div>
              <div className="preview-meta">
                <div>
                  <div className="title">{window.Screensavers.modules[selected].title}</div>
                  <div className="desc">{window.Screensavers.modules[selected].tagline}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  {countdown !== null && !fullscreen && (
                    <div style={{fontSize:10, letterSpacing:"0.2em", textTransform:"uppercase", opacity:0.7}}>
                      idle in {countdown}s
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
          {/* right: settings */}
          <div className="cp-col">
            <div className="cp-label">Settings</div>

            <div className="setting">
              <div className="row">
                <span>Density</span>
                <span style={{opacity:0.6}}>{Math.round(density*100)}%</span>
              </div>
              <input className="slider" type="range" min="0" max="1" step="0.05"
                     value={density} onChange={e=>setDensity(+e.target.value)} />
            </div>

            <div className="setting">
              <div className="row">
                <span>Idle activation</span>
                <span style={{opacity:0.6}}>{idleSec}s</span>
              </div>
              <input className="slider" type="range" min="3" max="30" step="1"
                     value={idleSec} onChange={e=>setIdleSec(+e.target.value)} />
            </div>

            {cycle && (
              <div className="setting">
                <div className="row">
                  <span>Cycle every</span>
                  <span style={{opacity:0.6}}>{cycleMin} min</span>
                </div>
                <input className="slider" type="range" min="1" max="60" step="1"
                       value={cycleMin} onChange={e=>setCycleMin(+e.target.value)} />
              </div>
            )}

            <div className="setting" style={{display:"flex", flexDirection:"column", gap:6}}>
              <label className="toggle"><input type="checkbox" checked={cycle} onChange={e=>setCycle(e.target.checked)} /> Cycle through modules</label>
              <label className="toggle"><input type="checkbox" checked={showClock} onChange={e=>setShowClock(e.target.checked)} /> Show clock overlay</label>
              <label className="toggle"><input type="checkbox" checked={sound} onChange={e=>setSound(e.target.checked)} /> Ambient hum</label>
              <label className="toggle"><input type="checkbox" checked={eggs} onChange={e=>setEggs(e.target.checked)} /> Random easter eggs</label>
            </div>

            {selected === "clock" && (
              <div className="setting">
                <div className="row" style={{marginBottom:5}}>
                  <span>Photo folder</span>
                  {picFolder && <span style={{opacity:0.45,fontSize:10,letterSpacing:"0.05em"}}>active</span>}
                </div>
                <div style={{display:"flex",gap:5,alignItems:"center"}}>
                  <button className="btn" style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontSize:10,textAlign:"left",padding:"4px 8px"}}
                    onClick={async()=>{
                      const f = await window.electronAPI?.selectFolder();
                      if(f) setPicFolder(f);
                    }}>
                    {picFolder ? picFolder.split(/[\\/]/).pop() || picFolder : "Choose folder…"}
                  </button>
                  {picFolder && <button className="btn" style={{padding:"4px 8px",flex:"none",fontSize:11}} onClick={()=>setPicFolder("")}>✕</button>}
                </div>
                {!picFolder && <div style={{opacity:0.4,fontSize:10,marginTop:4}}>Pick a folder and the gremlin eats your photos as Polaroids</div>}
              </div>
            )}

            <div className="btn-row">
              <button className="btn primary" onClick={test}>Test</button>
              <button className="btn" onClick={() => {
                const el = document.documentElement;
                if (document.fullscreenElement) document.exitFullscreen();
                else el.requestFullscreen?.();
              }}>Fullscreen</button>
            </div>
          </div>
        </div>
        <div className="cp-status">
          <span><span className="blink">●</span> Ready · selected: {window.Screensavers.modules[selected].title}</span>
          <span>click or press any key to exit</span>
        </div>
      </div>

      {/* ambient hum — simple oscillator via WebAudio, only plays when sound is on and fullscreen */}
      <ModuleAudio on={sound && fullscreen} selected={selected} />
    </div>
  );
}

function ModuleAudio({ on, selected }){
  const acRef = useRef(null);
  const stopRef = useRef(null);
  useEffect(() => {
    if (stopRef.current){ stopRef.current(); stopRef.current = null; }
    if (acRef.current){ try { acRef.current.close(); } catch(e){} acRef.current = null; }
    if (!on) return;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      const ac = new AC();
      acRef.current = ac;
      const master = ac.createGain();
      master.gain.setValueAtTime(0, ac.currentTime);
      master.gain.linearRampToValueAtTime(0.07, ac.currentTime + 2.5);
      master.connect(ac.destination);
      stopRef.current = buildAudio(ac, master, selected);
    } catch(e){}
    return () => {
      if (stopRef.current){ stopRef.current(); stopRef.current = null; }
      if (acRef.current){ try { acRef.current.close(); } catch(e){} acRef.current = null; }
    };
  }, [on, selected]);
  return null;
}

function buildAudio(ac, out, mod){
  const timers=[], oscs=[];
  function osc(type,freq){ const o=ac.createOscillator(); o.type=type; o.frequency.value=freq; o.start(); oscs.push(o); return o; }
  function gain(v){ const g=ac.createGain(); g.gain.value=v; return g; }
  function filt(type,freq,q){ const f=ac.createBiquadFilter(); f.type=type; f.frequency.value=freq; if(q!=null)f.Q.value=q; return f; }
  function noiseNode(){ const b=ac.createBuffer(1,ac.sampleRate*2,ac.sampleRate),d=b.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1; const s=ac.createBufferSource(); s.buffer=b; s.loop=true; s.start(); oscs.push(s); return s; }
  function pop(freq,dur,vol){ const o=ac.createOscillator(),g=ac.createGain(); o.type='sine'; o.frequency.value=freq; g.gain.setValueAtTime(vol,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur); o.connect(g); g.connect(out); o.start(); o.stop(ac.currentTime+dur); }
  function tick(fn,ms){ const id=setInterval(fn,ms); timers.push(id); }

  if(mod==='warp'){
    const drone=osc('sine',38), dlfo=osc('sine',0.08), dlg=gain(9); dlfo.connect(dlg); dlg.connect(drone.frequency);
    drone.connect(gain(0.42)).connect(out);
    const whine=osc('sine',820), wlfo=osc('sine',0.05), wlg=gain(85); wlfo.connect(wlg); wlg.connect(whine.frequency);
    whine.connect(gain(0.055)).connect(out);
    const n=noiseNode(), nf=filt('bandpass',2200,0.5); n.connect(nf); nf.connect(gain(0.038)).connect(out);
    tick(()=>{ const sw=ac.createOscillator(),sg=ac.createGain(); sw.frequency.setValueAtTime(180,ac.currentTime); sw.frequency.exponentialRampToValueAtTime(2400,ac.currentTime+1.6); sg.gain.setValueAtTime(0.14,ac.currentTime); sg.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+1.6); sw.connect(sg); sg.connect(out); sw.start(); sw.stop(ac.currentTime+1.7); }, 9000+Math.random()*7000);

  } else if(mod==='aquarium'){
    const n=noiseNode(), lp=filt('lowpass',360,0.9); n.connect(lp); lp.connect(gain(0.32)).connect(out);
    const n2=noiseNode(), bp=filt('bandpass',110,1.3); n2.connect(bp); bp.connect(gain(0.16)).connect(out);
    tick(()=>pop(160+Math.random()*320,0.07+Math.random()*0.07,0.16), 700+Math.random()*1400);
    tick(()=>pop(380+Math.random()*180,0.035,0.07), 1600+Math.random()*2200);

  } else if(mod==='planes'){
    const n=noiseNode(), bp=filt('bandpass',380,0.35); n.connect(bp); const lfo=osc('sine',0.11), lg=gain(70); lfo.connect(lg); lg.connect(bp.frequency); bp.connect(gain(0.2)).connect(out);
    tick(()=>{ const nw=noiseNode(), bpw=filt('bandpass',500+Math.random()*500,0.55), gw=ac.createGain(); nw.connect(bpw); bpw.connect(gw); gw.connect(out); gw.gain.setValueAtTime(0,ac.currentTime); gw.gain.linearRampToValueAtTime(0.18,ac.currentTime+0.35); gw.gain.linearRampToValueAtTime(0,ac.currentTime+1.3); setTimeout(()=>{ try{nw.stop();}catch(e){} },1500); }, 4500+Math.random()*6000);

  } else if(mod==='lava'){
    const n=noiseNode(), lp=filt('lowpass',75); n.connect(lp); lp.connect(gain(0.48)).connect(out);
    tick(()=>pop(50+Math.random()*90,0.28+Math.random()*0.45,0.28), 1100+Math.random()*2200);
    tick(()=>pop(110+Math.random()*55,0.14,0.11), 1900+Math.random()*3000);

  } else if(mod==='toast'){
    const NOTES=[261.63,293.66,329.63,392.00,440.00,523.25]; let ni=0;
    tick(()=>{ const freq=NOTES[ni++%NOTES.length]*(Math.random()<0.08?2:1); const o=ac.createOscillator(),g=ac.createGain(); o.type='triangle'; o.frequency.value=freq; g.gain.setValueAtTime(0.13,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.28); o.connect(g); g.connect(out); o.start(); o.stop(ac.currentTime+0.32); }, 370);
    tick(()=>{ pop(850+Math.random()*350,0.045,0.2); setTimeout(()=>pop(1300+Math.random()*200,0.035,0.1),70); }, 6000+Math.random()*9000);

  } else if(mod==='clock'){ // Desktop Havoc
    const lfo=osc('sine',7.5), lg=gain(18), base=osc('sine',185); lfo.connect(lg); lg.connect(base.frequency); base.connect(gain(0.07)).connect(out);
    tick(()=>{ const o=ac.createOscillator(),f=filt('bandpass',280+Math.random()*180,2),g=ac.createGain(); o.type='sawtooth'; o.frequency.value=140+Math.random()*110; g.gain.setValueAtTime(0.22,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.11); o.connect(f); f.connect(g); g.connect(out); o.start(); o.stop(ac.currentTime+0.13); }, 1100+Math.random()*2000);
    tick(()=>{ const o=ac.createOscillator(),g=ac.createGain(); o.type='square'; o.frequency.setValueAtTime(550+Math.random()*450,ac.currentTime); o.frequency.exponentialRampToValueAtTime(1100+Math.random()*900,ac.currentTime+0.09); g.gain.setValueAtTime(0.07,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+0.11); o.connect(g); g.connect(out); o.start(); o.stop(ac.currentTime+0.13); }, 750+Math.random()*1400);

  } else if(mod==='pipes'){
    const n=noiseNode(), bp=filt('bandpass',1900,0.45); n.connect(bp); bp.connect(gain(0.1)).connect(out);
    const saw=osc('sawtooth',55), lp=filt('lowpass',95); saw.connect(lp); lp.connect(gain(0.07)).connect(out);
    tick(()=>{ pop(380+Math.random()*650,0.055,0.22); if(Math.random()<0.45) setTimeout(()=>pop(280+Math.random()*420,0.04,0.13),110); }, 2200+Math.random()*4500);

  } else if(mod==='screams'){
    const n=noiseNode(), bp=filt('bandpass',750,0.28); n.connect(bp); bp.connect(gain(0.07)).connect(out);
    tick(()=>{ const o=ac.createOscillator(),g=ac.createGain(),vib=ac.createOscillator(),vg=gain(28+Math.random()*45); o.type='sawtooth'; o.frequency.value=180+Math.random()*650; vib.frequency.value=4+Math.random()*9; vib.connect(vg); vg.connect(o.frequency); const dur=0.35+Math.random()*0.9; g.gain.setValueAtTime(0.11,ac.currentTime); g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur); const lp=filt('lowpass',2200); o.connect(lp); lp.connect(g); g.connect(out); o.start(); vib.start(); o.stop(ac.currentTime+dur); vib.stop(ac.currentTime+dur); }, 900+Math.random()*1800);
  }

  return ()=>{ timers.forEach(id=>clearInterval(id)); oscs.forEach(n=>{ try{n.stop();}catch(e){} }); };
}

if (new URLSearchParams(location.search).get('mode') === 'screensaver') {
  if(window._dbg) window._dbg('Babel script running — screensaver mode detected');
  const density   = +(localStorage.getItem('ss.density') || 0.5);
  const cycle     = localStorage.getItem('ss.cycle') === '1';
  const cycleMin  = +(localStorage.getItem('ss.cycleMin') || 30);
  const picFolder = localStorage.getItem('ss.picFolder') || '';
  if(window._dbg) window._dbg(`selected=${localStorage.getItem('ss.selected')} picFolder=${picFolder||'(none)'} electronAPI=${!!window.electronAPI}`);
  const root      = document.getElementById('root');
  root.style.cssText = 'position:fixed;inset:0;background:#000;';
  document.getElementById('fs').remove();

  let idx = MODULE_ORDER.indexOf(localStorage.getItem('ss.selected') || 'warp');
  if (idx < 0) idx = 0;
  let instance = null;
  let imagePaths = [];

  function launchModule(i) {
    if(window._dbg) window._dbg(`launchModule ${MODULE_ORDER[i]}`);
    if (instance) { try { instance.stop(); } catch(e){} }
    root.innerHTML = '';
    const extraOpts = (MODULE_ORDER[i] === 'clock' && imagePaths.length > 0) ? { imagePaths } : {};
    try {
      instance = window.Screensavers.modules[MODULE_ORDER[i]]?.start(root, { density, ...extraOpts });
      if(window._dbg) { window._dbg('module started OK — hiding debug overlay'); document.getElementById('ss-dbg').style.display='none'; }
    } catch(err) {
      if(window._dbg) window._dbg(`module start ERROR: ${err}`);
    }
  }

  async function init() {
    if(window._dbg) window._dbg('init() called');
    if (picFolder && window.electronAPI?.listImages) {
      if(window._dbg) window._dbg('calling listImages...');
      try { imagePaths = (await window.electronAPI.listImages(picFolder)) || []; } catch(e){ if(window._dbg) window._dbg(`listImages error: ${e}`); }
      if(window._dbg) window._dbg(`imagePaths count: ${imagePaths.length}`);
    }
    launchModule(idx);
    if (cycle) {
      setInterval(() => { idx = (idx+1) % MODULE_ORDER.length; launchModule(idx); }, cycleMin * 60 * 1000);
    }
  }
  init();
} else {
  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
}

</script>
